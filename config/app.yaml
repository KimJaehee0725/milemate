app:
  name: last-mile-planning-agent
  environment: local
  backend:
    host: 0.0.0.0
    port: 8000
  frontend:
    framework: streamlit
  defaults:
    default_scenario: dispatch_recommendation
    citation_limit: 5
    allow_rollback: true

model:
  provider: huggingface
  model_id: google/gemma-4-26B-A4B-it
  dtype: auto
  max_context_tokens: 32768
  temperature: 0.2
  max_output_tokens: 2048
  api_style: openai_compatible

serving:
  engine: vllm
  base_url: http://127.0.0.1:8001/v1
  chat_completions_path: /chat/completions
  models_path: /models
  api_key_env: VLLM_API_KEY
  request_timeout_seconds: 120

huggingface:
  cache_dir: ${HF_HOME}
  token_env: HUGGINGFACE_HUB_TOKEN
  trust_remote_code: false

storage:
  stage_state: sqlite
  stage_state_path: data/app_state.sqlite
  memory_mode: local

features:
  use_mcp: true
  use_verifier: true
  use_long_term_memory: false
  require_stage_approval: true
