app:
  name: milemate-planning-assistant
  environment: local
  backend:
    host: 0.0.0.0
    port: 8000
  frontend:
    framework: streamlit
  defaults:
    default_scenario: dispatch_recommendation
    citation_limit: 5
    allow_rollback: true

report:
  prepared_by: "기획팀"
  version: "1.0"

model:
  provider: openai
  model_id: gpt-5.5
  dtype: managed
  max_context_tokens: 32768
  reasoning_effort: medium
  temperature: 0.2
  max_output_tokens: 2048
  api_style: responses

serving:
  engine: codex_cli
  cli_binary: codex
  request_timeout_seconds: 600

storage:
  stage_state: memory
  memory_mode: local

features:
  use_mcp: true
  use_verifier: true
  use_long_term_memory: false
  require_stage_approval: true
  use_codex_generation: true
  allow_deterministic_fallback: false
